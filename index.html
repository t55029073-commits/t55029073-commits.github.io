<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Shooter</title>
<style>
body{margin:0;overflow:hidden;background:#000;color:#fff;font-family:Arial}
canvas{display:block}
#hud{position:absolute;top:10px;left:10px;background:#000a;border:2px solid #0ff;padding:10px;border-radius:10px}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">Skor: <span id="skor">0</span></div>
<script>
const c=document.getElementById('game'),x=c.getContext('2d');
c.width=innerWidth;c.height=innerHeight;
let p={x:c.width/2,y:c.height-80,w:30,h:40,s:7},b=[],e=[],skor=0;
document.onmousemove=e=>p.x=e.clientX;
document.ontouchmove=e=>p.x=e.touches[0].clientX;
setInterval(()=>b.push({x:p.x,y:p.y-40}),150);
setInterval(()=>e.push({x:Math.random()*c.width,y:0}),500);
function loop(){
x.fillStyle='#000';x.fillRect(0,0,c.width,c.height);
x.fillStyle='#a0f';x.fillRect(p.x-15,p.y,30,40); // pesawat
b.forEach((v,i)=>{v.y-=10;x.fillStyle='#ff0';x.fillRect(v.x-2,v.y,4,10);if(v.y<0)b.splice(i,1)});
e.forEach((v,i)=>{v.y+=3;x.fillStyle='#f00';x.fillRect(v.x-15,v.y,30,20);if(v.y>c.height)e.splice(i,1);
b.forEach((vb,j)=>{if(Math.abs(v.x-vb.x)<15&&Math.abs(v.y-vb.y)<15){e.splice(i,1);b.splice(j,1);skor+=10;document.getElementById('skor').innerText=skor}})});
requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
