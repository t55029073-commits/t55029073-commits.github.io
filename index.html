<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=no">
<title>Project By Abry</title>
<style>
  body{margin:0;overflow:hidden;background:#000;font-family:Arial;color:#fff;touch-action:none}
  canvas{position:static}
  canvas.play{position:fixed;top:0;left:0}
.menu{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:9999;padding:20px}
.btn{background:#00aaff;border:0;color:#fff;padding:14px 30px;font-size:18px;border-radius:12px;font-weight:bold;box-shadow:0 0 15px #00aaff;cursor:pointer;width:200px;pointer-events:auto}
.skinBtn{background:#1a1a1a;width:90px;height:110px;border-radius:12px;border:3px solid #555;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:8px 5px;box-sizing:border-box;pointer-events:auto}
.skinBtn.active{border-color:#0ff;box-shadow:0 0 20px #0ff}
.skinBtn.locked{filter:grayscale(1) brightness(0.5)}
.skinPreview{width:70px;height:50px;background:#0005;border-radius:6px}
.skinName{font-size:11px;font-weight:bold}
.skinPrice{font-size:10px;color:#ffd700}
#game{display:none}
.statBox{position:fixed;top:10px;left:10px;background:#000a;border:2px solid #0ff;border-radius:12px;padding:8px 12px;font-size:16px;font-weight:bold;pointer-events:none;z-index:5}
.pauseBtn{position:fixed;top:10px;right:10px;background:#ff6600;border:0;color:#fff;font-size:22px;width:40px;height:40px;border-radius:50%;font-weight:bold;z-index:6;pointer-events:auto}
.pauseMenu{display:none;position:fixed;inset:0;background:#000c;align-items:center;justify-content:center;flex-direction:column;gap:15px;z-index:20}
.bossBar{position:fixed;top:60px;left:10px;right:10px;height:8px;background:#333;border-radius:5px;display:none;z-index:5}
.bossHp{height:100%;background:#f00;border-radius:5px;transition:width 0.3s}
.bossName{position:fixed;top:40px;left:50%;transform:translateX(-50%);font-size:16px;color:#f00;font-weight:bold;display:none;z-index:5}
.shield{position:fixed;top:60px;right:10px;font-size:16px;color:#0ff;font-weight:bold;display:none;z-index:5}
.popup{position:fixed;inset:0;background:#000a;display:none;align-items:center;justify-content:center;z-index:20}
.popupBox{background:#111;border:2px solid #0ff;border-radius:20px;padding:25px;text-align:center;max-width:300px}
.popupBox h2{color:#0ff;margin:0 0 10px;font-size:24px}
.popupBox p{margin:0 0 20px;font-size:18px;color:#ffd700}
</style>
</head>
<body>

<div id="mainMenu" class="menu">
  <h1 style="font-size:36px;color:#0ff;margin:0">PROJECT BY ABRY</h1>
  <div>Level: <span id="lvlTxt">1</span>/500 | Koin: <span id="coinTxt">0</span></div>
  <button class="btn" onclick="startGame()">PLAY</button>
  <button class="btn" style="background:#ff6600" onclick="showSkin()">SHOP SKIN</button>
</div>

<div id="skinMenu" class="menu" style="display:none">
  <h2>SHOP SKIN</h2>
  <div>Koin: <span id="coinShop">0</span></div>
  <div id="skinList" style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center"></div>
  <button class="btn" onclick="backMenu()">KEMBALI</button>
</div>

<div id="game">
  <canvas id="c"></canvas>
  <div class="statBox">
    <div>Skor: <span id="skor">0</span></div>
    <div>💰 <span id="koin">0</span></div>
    <div>💣 <span id="bom">0</span>/3</div>
    <div>❤️ <span id="nyawa">3</span> | LV <span id="lvNow">1</span></div>
  </div>
  <button class="pauseBtn" onclick="pauseGame()">⏸️</button>
  <div class="shield" id="shieldTxt">🛡️ SHIELD</div>
  <div class="bossName" id="bossName">BOSS</div>
  <div class="bossBar" id="bossBar"><div class="bossHp" id="bossHp"></div></div>
</div>

<div id="pauseMenu" class="pauseMenu">
  <h2 style="color:#ff6600">PAUSED</h2>
  <button class="btn" onclick="resumeGame()">RESUME</button>
  <button class="btn" style="background:#ff0000" onclick="restartGame()">ULANG</button>
  <button class="btn" style="background:#555" onclick="homeGame()">HOME</button>
</div>

<div id="popup" class="popup">
  <div class="popupBox" id="popupBox">
    <h2 id="popupTitle">LEVEL UP!</h2>
    <p id="popupText">+0 Koin</p>
    <button class="btn" onclick="closePopup()">OK</button>
  </div>
</div>

<script>
const c=document.getElementById('c'),x=c.getContext('2d');
c.width=innerWidth;c.height=innerHeight;const W=c.width,H=c.height;

let player,bullets,ebullets,enemy,particles,score,coins,lives,level,running=false,skin=0,aid,boss=null,isShooting=false,shootCD=0,shield=false,shieldT=0,bombCount=0,shake=0,isPaused=false;
const BOSS_LEVELS=[35,50,100,150,200,300,400,500];
const MAX_LEVEL=500;
const skinData=[
  {name:'Default',price:0,owned:1,draw:drawSkinDefault},
  {name:'Stealth',price:50,owned:0,draw:drawSkinStealth},
  {name:'Assault',price:100,owned:0,draw:drawSkinAssault},
  {name:'Mythic',price:200,owned:0,draw:drawSkinMythic}
];

function initAudio(){if(!aid)aid=new AudioContext()}
function playSound(t){if(!aid)return;const a=aid.currentTime,o=aid.createOscillator(),g=aid.createGain();o.connect(g).connect(aid.destination);
if(t==='pew'){o.type='square';o.frequency.setValueAtTime(1200,a);o.frequency.exponentialRampToValueAtTime(400,a+0.1);g.gain.setValueAtTime(0.15,a);g.gain.exponentialRampToValueAtTime(0.01,a+0.1);o.start(a);o.stop(a+0.1)}
if(t==='coin'){o.type='sine';o.frequency.setValueAtTime(800,a);o.frequency.setValueAtTime(1200,a+0.05);g.gain.setValueAtTime(0.15,a);g.gain.exponentialRampToValueAtTime(0.01,a+0.15);o.start(a);o.stop(a+0.15)}
if(t==='boom'){o.type='sine';o.frequency.setValueAtTime(200,a);o.frequency.exponentialRampToValueAtTime(40,a+0.3);g.gain.setValueAtTime(0.3,a);g.gain.exponentialRampToValueAtTime(0.01,a+0.3);o.start(a);o.stop(a+0.3)}}

function loadData(){coins=+localStorage.getItem('ss_coins')||0;level=+localStorage.getItem('ss_level')||1;if(level>MAX_LEVEL)level=MAX_LEVEL;skin=+localStorage.getItem('ss_skin')||0;skinData.forEach((s,i)=>s.owned=+localStorage.getItem('ss_skin_'+i)||s.owned)}
function saveData(){localStorage.setItem('ss_coins',coins);localStorage.setItem('ss_level',level);localStorage.setItem('ss_skin',skin);skinData.forEach((s,i)=>localStorage.setItem('ss_skin_'+i,s.owned))}

function showSkin(){mainMenu.style.display='none';skinMenu.style.display='flex';coinShop.textContent=coins;skinList.innerHTML='';
skinData.forEach((s,i)=>{const btn=document.createElement('button');btn.className='skinBtn'+(skin==i?' active':'')+(s.owned?'':' locked');
const mini=document.createElement('canvas');mini.width=70;mini.height=50;mini.className='skinPreview';const mx=mini.getContext('2d');
mx.clearRect(0,0,70,50);mx.translate(35,28);mx.scale(0.5,0.5);s.draw(0,0,mx,false);
const name=document.createElement('div');name.className='skinName';name.textContent=s.name;
const price=document.createElement('div');price.className='skinPrice';price.textContent=s.owned?'USE':s.price+'💰';
btn.appendChild(mini);btn.appendChild(name);btn.appendChild(price);
btn.onclick=()=>{if(s.owned){skin=i;saveData();showSkin()}else if(coins>=s.price){coins-=s.price;s.owned=1;skin=i;saveData();showSkin();playSound('coin')}};skinList.appendChild(btn)})}
function backMenu(){skinMenu.style.display='none';mainMenu.style.display='flex';coinTxt.textContent=coins;lvlTxt.textContent=level}

function showPopup(t,p,w=0){popupTitle.textContent=t;popupText.textContent=p;popupBox.className='popupBox'+(w?' winBox':'');popup.style.display='flex';running=false}
function closePopup(){popup.style.display='none';if(level>=MAX_LEVEL){level=1;coins=0;saveData()}backMenu();game.style.display='none';c.classList.remove('play')}

function pauseGame(){isPaused=true;pauseMenu.style.display='flex';running=false}
function resumeGame(){isPaused=false;pauseMenu.style.display='none';running=true;requestAnimationFrame(loop)}
function restartGame(){pauseMenu.style.display='none';startGame()}
function homeGame(){pauseMenu.style.display='none';saveData();backMenu();game.style.display='none';c.classList.remove('play')}

function spawnBoss(lv){const tier=BOSS_LEVELS.indexOf(lv)+1;boss={x:W/2,y:80,hp:60*tier,maxHp:60*tier,size:35+tier*5,spd:1+tier*0.25,dir:1,t:0,name:`BOSS TIER-${tier} Lv${lv}`};enemy=[];ebullets=[];bossName.textContent=boss.name;bossBar.style.display='block';bossName.style.display='block';bossHp.style.width='100%';playSound('boom')}

function createExplosion(px,py){shake=10;for(let i=0;i<15;i++)particles.push({x:px,y:py,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:30,size:Math.random()*5});playSound('boom')}
function useBomb(){if(bombCount>=3){bombCount=0;playSound('boom');shake=20;enemy.forEach(e=>createExplosion(e.x,e.y));if(boss){boss.hp-=100;bossHp.style.width=(boss.hp/boss.maxHp*100)+'%';if(boss.hp<=0){coins+=100*level;score+=500*level;playSound('coin');createExplosion(boss.x,boss.y);boss=null;bossBar.style.display='none';bossName.style.display='none'}}enemy=[];ebullets=[];score+=200}}

function startGame(){
  initAudio();
  if(level>=MAX_LEVEL){level=1;coins=0;saveData()}
  mainMenu.style.display='none';game.style.display='block';
  c.classList.add('play');
  player={x:W/2,y:H-80};bullets=[];ebullets=[];enemy=[];particles=[];score=0;lives=3;running=true;boss=null;isShooting=false;shootCD=0;shield=false;shieldT=0;bombCount=0;shake=0;isPaused=false;
  bossBar.style.display='none';bossName.style.display='none';shieldTxt.style.display='none';
  if(level%10==0){shield=true;shieldT=300;shieldTxt.style.display='block'}
  if(BOSS_LEVELS.includes(level)){spawnBoss(level)}else{
    const n=2+Math.floor(level*1.2),s=0.4+level*0.015;
    for(let i=0;i<n;i++){const type=Math.random()<0.3+level*0.001?1:0;enemy.push({x:30+i*(W-60)/n,y:60+i%3*30,t:Math.random()*100,spd:s,type:type})}
  }
  lvNow.textContent=level;requestAnimationFrame(loop)
}

c.ontouchstart=e=>{if(running&&player&&!isPaused){e.preventDefault();if(e.touches.length>=2){useBomb();return}isShooting=true;player.x=Math.max(30,Math.min(W-30,e.touches[0].clientX))}}
c.ontouchmove=e=>{if(player&&isShooting&&e.touches.length==1&&!isPaused)e.preventDefault(),player.x=Math.max(30,Math.min(W-30,e.touches[0].clientX))}
c.ontouchend=e=>{if(e.touches.length==0)isShooting=false}

function drawSkinDefault(px,py,ctx=x,useShield=true){ctx.save();ctx.translate(px,py);if(useShield&&shield){ctx.strokeStyle='#0ff';ctx.lineWidth=3;ctx.shadowBlur=20;ctx.beginPath();ctx.arc(0,-5,35,0,6.28);ctx.stroke();ctx.shadowBlur=0}ctx.fillStyle='#E0E8F0';ctx.beginPath();ctx.moveTo(0,-35);ctx.lineTo(-8,-5);ctx.lineTo(-6,25);ctx.lineTo(6,25);ctx.lineTo(8,-5);ctx.closePath();ctx.fill();ctx.fillStyle='#C62828';ctx.fillRect(-38,-3,4,6);ctx.fillRect(-25,-8,5,20);ctx.fillRect(20,-8,5,20);ctx.fillStyle='#0ff';ctx.shadowBlur=15;ctx.beginPath();ctx.arc(0,28,4,0,6.28);ctx.fill();ctx.shadowBlur=0;ctx.restore()}
function drawSkinStealth(px,py,ctx=x,useShield=true){ctx.save();ctx.translate(px,py);if(useShield&&shield){ctx.strokeStyle='#0ff';ctx.lineWidth=3;ctx.shadowBlur=20;ctx.beginPath();ctx.arc(0,-5,35,0,6.28);ctx.stroke();ctx.shadowBlur=0}ctx.fillStyle='#222';ctx.beginPath();ctx.moveTo(0,-40);ctx.lineTo(-35,-10);ctx.lineTo(-30,20);ctx.lineTo(0,28);ctx.lineTo(30,20);ctx.lineTo(35,-10);ctx.closePath();ctx.fill();ctx.fillStyle='#00aaff';ctx.fillRect(-32,-5,6,8);ctx.fillRect(26,-5,6,8);ctx.fillStyle='#0ff';ctx.shadowBlur=15;ctx.beginPath();ctx.arc(0,30,4,0,6.28);ctx.fill();ctx.shadowBlur=0;ctx.restore()}
function drawSkinAssault(px,py,ctx=x,useShield=true){ctx.save();ctx.translate(px,py);if(useShield&&shield){ctx.strokeStyle='#0ff';ctx.lineWidth=3;ctx.shadowBlur=20;ctx.beginPath();ctx.arc(0,-5,38,0,6.28);ctx.stroke();ctx.shadowBlur=0}ctx.fillStyle='#0A4D0A';ctx.fillRect(-8,-35,16,60);ctx.beginPath();ctx.moveTo(-8,-35);ctx.lineTo(-40,-15);ctx.lineTo(-38,15);ctx.lineTo(-8,25);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(8,-35);ctx.lineTo(40,-15);ctx.lineTo(38,15);ctx.lineTo(8,25);ctx.closePath();ctx.fill();ctx.fillStyle='#ffff00';ctx.fillRect(-20,-5,8,18);ctx.fillRect(12,-5,8,18);ctx.fillStyle='#0ff';ctx.shadowBlur=15;ctx.beginPath();ctx.arc(-15,25,4,0,6.28);ctx.arc(15,25,4,0,6.28);ctx.fill();ctx.shadowBlur=0;ctx.restore()}
function drawSkinMythic(px,py,ctx=x,useShield=true){ctx.save();ctx.translate(px,py);if(useShield&&shield){ctx.strokeStyle='#0ff';ctx.lineWidth=3;ctx.shadowBlur=20;ctx.beginPath();ctx.arc(0,-5,36,0,6.28);ctx.stroke();ctx.shadowBlur=0}ctx.fillStyle='#4A148C';ctx.beginPath();ctx.moveTo(0,-38);ctx.quadraticCurveTo(-20,-20,-15,0);ctx.quadraticCurveTo(-12,25,0,30);ctx.quadraticCurveTo(12,25,15,0);ctx.quadraticCurveTo(20,-20,0,-38);ctx.fill();ctx.fillStyle='#ff9800';ctx.beginPath();ctx.moveTo(-15,0);ctx.lineTo(-25,-10);ctx.lineTo(-20,15);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(15,0);ctx.lineTo(25,-10);ctx.lineTo(20,15);ctx.closePath();ctx.fill();ctx.fillStyle='#ff00ff';ctx.fillRect(0,-20,4,15);ctx.fillStyle='#0ff';ctx.shadowBlur=20;ctx.beginPath();ctx.arc(0,32,5,0,6.28);ctx.fill();ctx.shadowBlur=0;ctx.restore()}

function drawEnemy(px,py,type,t){x.save();x.translate(px,py);x.scale(0.85,0.85);if(type==0){x.fillStyle='#B71C1C';x.shadowBlur=20;x.beginPath();x.moveTo(0,-30);x.lineTo(-7,-8);x.lineTo(-6,22);x.lineTo(6,22);x.lineTo(7,-8);x.closePath();x.fill();x.fillStyle='#FF3D00';x.shadowBlur=15;x.beginPath();x.arc(0,24,4+Math.sin(t*0.3)*1,0,6.28);x.fill()}else{x.fillStyle='#111';x.shadowBlur=25;x.beginPath();x.moveTo(0,-32);x.lineTo(-8,-9);x.lineTo(-7,24);x.lineTo(7,24);x.lineTo(8,-9);x.closePath();x.fill();x.fillStyle='#FF0';x.shadowBlur=20;x.beginPath();x.arc(0,26,5+Math.sin(t*0.4)*1,0,6.28);x.fill()}x.restore()}
function drawBoss(b){x.save();x.translate(b.x,b.y);x.fillStyle='#800';x.shadowBlur=25;x.beginPath();x.moveTo(0,-b.size);x.lineTo(-b.size*0.8,-b.size*0.3);x.lineTo(-b.size*0.6,b.size*0.8);x.lineTo(b.size*0.6,b.size*0.8);x.lineTo(b.size*0.8,-b.size*0.3);x.closePath();x.fill();x.fillStyle='#ff0';x.shadowBlur=20;x.beginPath();x.arc(0,b.size*0.9,8,0,6.28);x.fill();x.restore()}

function loop(){
  if(!running)return;x.save();if(shake>0){x.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);shake--}x.clearRect(0,0,W,H);
  x.fillStyle='#fff';for(let i=0;i<40;i++)x.fillRect(Math.random()*W,Math.random()*H,1,1);
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life--;x.fillStyle=`hsl(${30+Math.random()*30},100%,50%)`;x.globalAlpha=p.life/30;x.beginPath();x.arc(p.x,p.y,p.size,0,6.28);x.fill();if(p.life<=0)particles.splice(i,1)}x.globalAlpha=1;
  
  // INI FIX NYA BRE 👇
  if(player){skinData[skin].draw(player.x,player.y);}

  if(isShooting&&shootCD<=0){bullets.push({x:player.x,y:player.y-30});playSound('pew');shootCD=10}
  if(shootCD>0)shootCD--;if(shieldT>0){shieldT--;if(shieldT<=0){shield=false;shieldTxt.style.display='none'}}
  for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];b.y-=8;x.fillStyle='#ff0';x.shadowBlur=10;x.fillRect(b.x-2,b.y,4,12);if(b.y<0){bullets.splice(i,1);continue}
    if(boss&&Math.abs(b.x-boss.x)<boss.size&&Math.abs(b.y-boss.y)<boss.size){bullets.splice(i,1);boss.hp-=5;bossHp.style.width=(boss.hp/boss.maxHp*100)+'%';playSound('boom');if(boss.hp<=0){coins+=100*level;score+=500*level;playSound('coin');createExplosion(boss.x,boss.y);boss=null;bossBar.style.display='none';bossName.style.display='none'}}else{for(let j=enemy.length-1;j>=0;j--){const e=enemy[j];if(Math.abs(b.x-e.x)<15&&Math.abs(b.y-e.y)<15){enemy.splice(j,1);bullets.splice(i,1);score+=10+e.type*5;coins++;bombCount=Math.min(3,bombCount+1);createExplosion(e.x,e.y);playSound('coin');break}}}}
  for(let i=ebullets.length-1;i>=0;i--){const b=ebullets[i];b.y+=5;x.fillStyle='#f0f';x.shadowBlur=10;x.fillRect(b.x-2,b.y,4,12);if(b.y>H){ebullets.splice(i,1);continue};if(player&&Math.abs(b.x-player.x)<20&&Math.abs(b.y-player.y)<25){ebullets.splice(i,1);if(!shield){lives--;playSound('boom')}}}
  if(boss){drawBoss(boss);boss.t++;boss.x+=boss.spd*boss.dir;if(boss.x>W-boss.size||boss.x<boss.size)boss.dir*=-1;if(boss.t%20==0){ebullets.push({x:boss.x,y:boss.y+boss.size});ebullets.push({x:boss.x-20,y:boss.y+boss.size});ebullets.push({x:boss.x+20,y:boss.y+boss.size})}if(player&&Math.abs(boss.x-player.x)<boss.size&&Math.abs(boss.y-player.y)<boss.size&&!shield){lives--;boss=null;bossBar.style.display='none';bossName.style.display='none';playSound('boom')}}else{const r=Math.max(0.008,0.02-level*0.00003);for(let i=enemy.length-1;i>=0;i--){const e=enemy[i];drawEnemy(e.x,e.y,e.type,e.t);e.y+=e.spd;e.t++;if(e.t%40==0&&Math.random()<r)ebullets.push({x:e.x,y:e.y+15});if(player&&e.y>player.y-20&&!shield){lives--;enemy.splice(i,1);createExplosion(e.x,e.y)}}}
  skor.textContent=score;koin.textContent=coins;lvNow.textContent=level;bom.textContent=bombCount;nyawa.textContent=lives;
  if(lives<=0){saveData();setTimeout(()=>{showPopup('GAME OVER','Skor: '+score)},50);return}
  if(!boss&&enemy.length==0){if(level>=MAX_LEVEL){coins+=5000;saveData();setTimeout(()=>{showPopup('CONGRATS! YOU WIN','TAMAT LEVEL 500! +5000 Koin',1)},50);return}level++;saveData();setTimeout(()=>{showPopup('LEVEL '+level+' UNLOCKED','+'+score+' Koin')},50);return}
  x.restore();requestAnimationFrame(loop)
}
loadData();coinTxt.textContent=coins;lvlTxt.textContent=level;
</script>
</body>
    </html>
